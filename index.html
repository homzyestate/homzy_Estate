<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homzy Estate | Premium Real Estate Islamabad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --primary: #0A3D2B;   /* Dark Green */
            --accent: #D4AF37;    /* Gold */
        }
        
        .tail-container { font-family: 'Inter', system-ui, sans-serif; }
        .heading-font { font-family: 'Playfair Display', sans-serif; }

        .hero-bg video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-200">

    <!-- Navbar -->
    <nav class="bg-zinc-950/95 backdrop-blur-md border-b border-zinc-800 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <!-- Your Logo -->
                <img src="https://i.imgur.com/REPLACE_WITH_YOUR_LOGO_LINK.png" alt="Homzy Estate" class="h-14">
                <!-- اگر logo SVG استعمال کرنا چاہیں تو نیچے والا استعمال کریں -->
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="#home" class="hover:text-amber-400 transition-colors">Home</a>
                <a href="#projects" class="hover:text-amber-400 transition-colors">Projects</a>
                <a href="#about" class="hover:text-amber-400 transition-colors">About Us</a>
                <a href="#contact" class="hover:text-amber-400 transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Hero with Video -->
    <section id="home" class="hero-bg relative h-screen flex items-center overflow-hidden">
        <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover">
            <source src="https://assets.mixkit.co/videos/preview/13536/13536004_3840_2160_25fps.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-black/50"></div>
        
        <div class="max-w-7xl mx-auto px-6 relative z-10 text-center md:text-left">
            <h1 class="text-6xl md:text-7xl font-bold heading-font leading-tight">
                Premium Homes in<br><span class="text-[#D4AF37]">Islamabad</span>
            </h1>
            <p class="mt-6 text-xl max-w-xl mx-auto md:mx-0 text-zinc-200">
                Discover luxury living with Homzy Estate
            </p>
            <button onclick="document.getElementById('projects').scrollIntoView({behavior:'smooth'})" 
                    class="mt-10 px-10 py-5 bg-[#D4AF37] hover:bg-white text-zinc-950 font-semibold rounded-2xl text-lg transition-all">
                Explore Projects
            </button>
        </div>
    </section>

    <!-- Projects Section (مختصر) -->
    <section id="projects" class="py-24 bg-zinc-900">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-5xl heading-font text-center mb-16 text-white">Our Premium Projects</h2>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="bg-zinc-800 rounded-3xl overflow-hidden">
                    <img src="https://picsum.photos/id/1015/600/400" class="w-full h-64 object-cover">
                    <div class="p-8">
                        <h3 class="text-2xl font-bold">Skylite Builders</h3>
                        <p class="text-[#D4AF37]">Luxury Living</p>
                    </div>
                </div>
                <!-- باقی دو کارڈز بھی اسی طرح شامل کریں -->
            </div>
        </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="py-20 bg-zinc-950 border-t border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-4xl heading-font mb-6">Contact Us</h2>
            <a href="tel:+923291171595" class="text-4xl font-semibold text-[#D4AF37] hover:text-amber-300">
                +92 329 1171595
            </a>
        </div>
    </section>

</body>
</html>
