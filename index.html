<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homzy Estate | Premium Real Estate Islamabad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .heading { font-family: 'Playfair Display', serif; }
    .hero-bg { background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1920'); }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-green-900">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="https://i.imgur.com/0z8z7zL.png" alt="Homzy Estate" class="h-12">
        <div>
          <span class="text-3xl font-bold heading tracking-tighter">Homzy Estate</span>
        </div>
      </div>
      <div class="hidden md:flex gap-8 text-lg">
        <a href="#properties" class="hover:text-emerald-400 transition">Properties</a>
        <a href="#about" class="hover:text-emerald-400 transition">About</a>
        <a href="#contact" class="hover:text-emerald-400 transition">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section id="home" class="hero-bg min-h-screen flex items-center justify-center text-center">
    <div class="max-w-4xl mx-auto px-6">
      <img src="https://i.imgur.com/0z8z7zL.png" alt="Logo" class="mx-auto h-28 mb-8">
      <h1 class="text-5xl md:text-7xl heading font-bold mb-6">Premium Real Estate<br>Islamabad</h1>
      <p class="text-xl md:text-2xl text-gray-300 mb-10">Luxury Homes • Smart Investments • Trusted Service</p>
      <a href="#contact" class="inline-block bg-emerald-600 hover:bg-emerald-500 text-white text-xl px-12 py-5 rounded-full font-semibold">
        Get In Touch
      </a>
    </div>
  </section>

  <!-- Properties, About, Contact sections same as before but improved -->

  <section id="properties" class="py-24 bg-zinc-900">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-5xl heading font-bold text-center mb-16">Featured Properties</h2>
      <!-- Add more property cards here as needed -->
    </div>
  </section>

  <section id="contact" class="py-24 bg-black">
    <div class="max-w-4xl mx-auto text-center px-6">
      <h2 class="text-5xl heading font-bold mb-10">Contact Us</h2>
      <div class="text-3xl mb-8">
        <a href="https://wa.me/92321567890" class="text-emerald-400 hover:text-emerald-300">📱 WhatsApp: +92 321 567890</a>
      </div>
      <p class="text-gray-400">Islamabad, Pakistan</p>
    </div>
  </section>

  <footer class="bg-zinc-950 py-8 text-center text-gray-500">
    ©️ 2026 Homzy Estate - All Rights Reserved
  </footer>
</body>
</html>
